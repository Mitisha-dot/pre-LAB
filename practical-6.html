<html>
<head>
<title>GATE Registration Form</title>
</head>
<body>
<h2 align="center">GATE Registration Form</h2>
<form>
<fieldset>
<legend>Personal Information</legend>
Name:<input type="text"name="name"><br><br>
Email:<input type="email"name="email"><br><br>
Mobile No:<input type="number"name="mobile"><br><br>
Gender:
<input type="radio"name="gender">Male
<input type="radio"name="gender">Female
<br><br>
</fieldset>
<br>
<fieldset>
<legend>Educational Information</legend>
College Name:<input type="text"name="college"><br><br>
Branch:
<select>
<option>CSE</option>
<option>IT</option>
<option>Mechanical</option>
<option>Electrical</option>
</select>
Year:
<select>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>
</fieldset>
<br>
<fieldset>
<legend>Scholarship Details</legend>
Scholarship Type:<br>
<input type="checkbox">Merit Based<br>
<input type="checkbox">Need Based<br>
<input type="checkbox">Sports Scholarship<br>
</fieldset>
<br>
<input type="submit"value="Submit">
<input type="reset"value="Reset">
</form>
</body>
</html>
