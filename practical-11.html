<html>
<head>
<title>practical-11</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background-color: lightblue;
}

/* Drag & Drop */
#dragBox {
  width: 100px;
  height: 100px;
  background-color: orange;
  text-align: center;
  line-height: 100px;
  cursor: grab;
}

#dropArea {
  width: 100%;
  height: 150px;
  background-color: lightgray;
  border: 2px dashed black;
  text-align: center;
  line-height: 150px;
}

/* Storage Box */
.storage-box {
  background-color: white;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container py-4">

  <h1 class="text-center mb-4">HTML5 APIs Demo</h1>

  <div class="row g-4">

    <!-- Drag & Drop -->
    <div class="col-md-4">
      <div class="card p-3">
        <h4>Drag & Drop</h4>

        <div id="dragBox" draggable="true">Drag</div>

        <div id="dropArea" class="mt-3">Drop Here</div>
      </div>
    </div>

    <!-- Geolocation -->
    <div class="col-md-4">
      <div class="card p-3">
        <h4>Geolocation</h4>
        <button class="btn btn-primary mb-2" onclick="getLocation()">Get Location</button>
        <p id="locationOutput">Click button to get location</p>
      </div>
    </div>

    <!-- Web Storage -->
    <div class="col-md-4">
      <div class="card p-3 storage-box">
        <h4>Web Storage</h4>
        <input type="text" id="nameInput" class="form-control mb-2" placeholder="Enter your name">
        <button class="btn btn-success mb-2" onclick="saveData()">Save</button>
        <button class="btn btn-warning mb-2" onclick="loadData()">Load</button>
        <p id="storageOutput"></p>
      </div>
    </div>

  </div>

</div>

<script>

/* Drag & Drop */
let dragBox = document.getElementById("dragBox");
let dropArea = document.getElementById("dropArea");

dragBox.addEventListener("dragstart", function(e) {
  e.dataTransfer.setData("text", "dragBox");
});

dropArea.addEventListener("dragover", function(e) {
  e.preventDefault();
});

dropArea.addEventListener("drop", function(e) {
  e.preventDefault();
  let data = e.dataTransfer.getData("text");
  dropArea.appendChild(document.getElementById(data));
});

/* Geolocation */
function getLocation() {
  let output = document.getElementById("locationOutput");

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      output.innerHTML = "Latitude: " + position.coords.latitude +
                         "<br>Longitude: " + position.coords.longitude;
    });
  } else {
    output.innerHTML = "Geolocation not supported.";
  }
}

/* Web Storage */
function saveData() {
  let name = document.getElementById("nameInput").value;
  localStorage.setItem("username", name);
  alert("Data Saved!");
}

function loadData() {
  let name = localStorage.getItem("username");
  document.getElementById("storageOutput").innerHTML = "Stored Name: " + name;
}

</script>

</body>
</html>
