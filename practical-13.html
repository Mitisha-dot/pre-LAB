<html>
<head>
  <title>Practical-13</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: lightgray;
    }

    .header {
      background-color: blue;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .card {
      background-color: white;
      border: 1px solid gray;
    }

    .footer {
      background-color: black;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 30px;
    }

    .section-title {
      color: darkblue;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>My Practical Webpage</h2>
  <p>Bootstrap Components</p>
</div>

<div class="container mt-4">


  <div class="card p-4 mb-4">
    <h4 class="section-title">Login Form</h4>

    <form>
      <div class="mb-3">
        <label>Email address</label>
        <input type="email" class="form-control">
      </div>

      <div class="mb-3">
        <label>Password</label>
        <input type="password" class="form-control">
      </div>

      <div class="form-check mb-3">
        <input type="checkbox" class="form-check-input">
        <label class="form-check-label">Remember me</label>
      </div>

      <button class="btn btn-primary w-100">Submit</button>
    </form>
  </div>

  <div class="text-center mb-4">
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#exampleModal">
      Open Modal
    </button>
  </div>


  <div class="modal fade" id="exampleModal">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header" style="background-color: blue; color: white;">
          <h5 class="modal-title">Modal Title</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          This is modal content.
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button class="btn btn-primary">Save</button>
        </div>

      </div>
    </div>
  </div>


  <div class="text-center mb-4">
    <div class="btn-group">
      <button class="btn btn-danger dropdown-toggle" data-bs-toggle="dropdown">
        Select Option
      </button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" href="#">Action</a></li>
        <li><a class="dropdown-item" href="#">Another action</a></li>
      </ul>
    </div>
  </div>

  
  <nav class="mb-4">
    <ol class="breadcrumb justify-content-center">
      <li class="breadcrumb-item"><a href="#">Home</a></li>
      <li class="breadcrumb-item">Library</li>
      <li class="breadcrumb-item active">Data</li>
    </ol>
  </nav>

  <div class="card p-3">
    <h5 class="section-title">Float Example</h5>

    <div class="float-start p-2" style="background-color: yellow;">Left</div>
    <div class="float-end p-2" style="background-color: lightblue;">Right</div>

    <div class="clearfix"></div>
  </div>

</div>

<div class="footer">
  <p>Practical-13</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
